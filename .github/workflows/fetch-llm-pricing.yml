name: Fetch LLM Pricing Data

on:
  schedule:
    - cron: "0 6 * * *" # daily at 06:00 UTC
  workflow_dispatch: # manual trigger

permissions:
  contents: write

concurrency:
  group: fetch-pricing
  cancel-in-progress: false

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # Need full ref + write token so the commit-and-push step below can
          # push back to main. Default checkout uses GITHUB_TOKEN which the
          # `permissions: contents: write` grant above scopes correctly.
          ref: main

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Fetch pricing data
        run: node fetch-pricing.mjs --out data

      - name: Commit and push to main
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add data/
          if git diff --staged --quiet; then
            echo "No changes — pricing snapshot unchanged."
            exit 0
          fi

          # Generate a single-line summary of what changed so the commit log
          # is more useful than a generic "update" message.
          summary=""
          if [ -f data/summary.json ]; then
            count=$(jq -r '.model_count // empty' data/summary.json 2>/dev/null || echo "")
            providers=$(jq -r '.provider_count // empty' data/summary.json 2>/dev/null || echo "")
            if [ -n "$count" ] && [ -n "$providers" ]; then
              summary=" (${count} models, ${providers} providers)"
            fi
          fi

          git commit -m "chore: update LLM pricing data — $(date +%Y-%m-%d)${summary}"
          git push origin HEAD:main
